function parsePool(poolStr){

}
function parseRouse(costStr){if(!costStr)return 0;var m=costStr.match(/(\d+)\s*Rouse/i);return m?parseInt(m[1]):0;}
function rollRouse(n){

h+='<div style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bl);border-radius:4px;margin-bottom:10px;border-left:2px solid var(--al)"><div style="font-size:18px;flex-shrink:0">'+dc.icon+'</div><div><div style="font-size:13px;font-weight:bold;color:var(--tb)">'+pw.n+'</div><div style="font-size:10px;color:var(--td)">'+dc.n+(dc.path?' \u2014 '+dc.path:'')+' \u2022 Lvl '+pw.l+'</div><div style="font-size:10px;color:var(--al);margin-top:2px">Cost: '+pw.cost+'</div><div style="font-size:10px;color:var(--td);margin-top:2px;font-style:italic">'+pw.desc+'</div></div></div>';
h+='<div class="fg"><label>Pool</label><div style="flex:1;font-size:12px;color:var(--tb)">'+pw.pool+' ('+pool+')</div></div>';
} else {
h+='<div style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bl);border-radius:4px;margin-bottom:10px;border-left:2px solid var(--al)"><div style="font-size:18px;flex-shrink:0">\u2694</div><div><div style="font-size:13px;font-weight:bold;color:var(--tb)">'+w.n+'</div><div style="font-size:10px;color:var(--td)">'+w.t+' \u2014 '+F(w.attr)+' + '+F(w.skill)+'</div></div></div>';
h+='<div class="fg"><label>Pool</label><div style="flex:1;font-size:12px;color:var(--tb)">'+F(w.attr)+' ('+av+') + '+F(w.skill)+' ('+sv+')</div></div>';
}
h+='<div class="fg"><label>Modifier</label><input type="number" value="'+mod+'" onchange="rollData.mod=parseInt(this.value)||0;r()"></div>';
h+='<div class="fg"><label>Hunger</label><input type="number" value="'+hun+'" min="0" max="5" onchange="rollData.hun=parseInt(this.value)||0;r()"></div>';
h+='<div class="PD"><span class="pn2">'+pool+'</span><span class="pl2">attack pool<br><em>'+hc+' hunger '+(hc===1?'die':'dice')+'</em></span></div>';
h+='<div style="font-size:9px;color:var(--td);padding:6px 0;border-top:1px solid var(--bd);margin-top:4px;line-height:1.5">\u2139 In Foundry this posts an <span style="color:var(--tb)">attack chat card</span>. The defender clicks Dodge, Block, or Parry on the card to respond. Successes are compared automatically.</div>';
h+='</div><div class="MF"><button class="cb2" onclick="closeM()">Cancel</button><button class="rb" onclick="execAtk()">'+(rollData.isPower?'Cast':'Roll attack')+'</button></div>';

} else if(step==='result'){
var x=rollData.atkResult;
h+='<div style="padding:12px">';
h+='<div style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bl);border-radius:4px;margin-bottom:10px;border-left:2px solid var(--al)"><div style="font-size:18px;flex-shrink:0">'+(rollData.isPower?rollData.disc.icon:'\u2694')+'</div><div><div style="font-size:13px;font-weight:bold;color:var(--tb)">'+w.n+(rollData.isPower?'':' \u2014 Attack')+'</div><div style="font-size:10px;color:var(--td)">'+(rollData.isPower?rollData.power.pool:F(w.attr)+' + '+F(w.skill))+' \u2014 Pool: '+x.pool+'</div></div></div>';
if(x.rouse){h+='<div style="padding:6px 10px;background:'+(x.rouse.failures>0?'rgba(153,17,17,.15)':'rgba(74,138,74,.1)')+';border:1px solid '+(x.rouse.failures>0?'rgba(153,17,17,.3)':'rgba(74,138,74,.2)')+';border-radius:4px;margin-bottom:8px;display:flex;align-items:center;gap:8px"><span style="font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--gd);min-width:50px">Rouse '+(x.rouse.total>1?'x'+x.rouse.total:'')+'</span><span style="display:flex;gap:4px">';x.rouse.checks.forEach(function(c){h+='<span class="rd0 '+(c.fail?'hd be':'n su')+'" style="width:26px;height:26px;font-size:12px">'+c.die+'</span>';});h+='</span><span style="font-size:10px;font-weight:bold;color:'+(x.rouse.failures>0?'var(--hg)':'#4a8a4a')+';margin-left:auto">'+(x.rouse.failures>0?'Hunger +'+x.rouse.failures+' \u2192 '+C.hunger:'No hunger gain')+'</span></div>';}
h+='<div class="DT">';
x.nd.forEach(function(d){var c='rd0 n';if(d===10)c+=' cr';else if(d>=6)c+=' su';h+='<span class="'+c+'">'+d+'</span>';});
x.hd.forEach(function(d){var c='rd0 hd';if(d===10)c+=' cr';else if(d===1)c+=' be';else if(d>=6)c+=' su';h+='<span class="'+c+'">'+d+'</span>';});
h+='</div>';
h+='<div class="RR '+x.cl+'"><span class="ro">'+x.succ+' success'+(x.succ!==1?'es':'')+'</span><span class="rs">'+x.oc+'</span></div>';
if(x.mc)h+='<div class="RW m">A Beast lurks behind this victory...</div>';
if(x.bf)h+='<div class="RW be">The Beast claws at the surface!</div>';

if(!rollData.isPower||rollData.isCombat){
h+='<div style="margin-top:12px;padding:10px;background:var(--bl);border:1px solid var(--bd);border-radius:4px">';
h+='<div style="font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--gd);margin-bottom:8px">Defender responds</div>';
h+='<div style="display:flex;gap:6px;margin-bottom:8px"><button class="ab" onclick="execDef(\'dodge\',3,2)" style="flex:1;justify-content:center">&#10226; Dodge<br><span style="font-size:8px;color:var(--td)">Dex + Athletics</span></button><button class="ab" onclick="execDef(\'block\',3,2)" style="flex:1;justify-content:center">&#9711; Block<br><span style="font-size:8px;color:var(--td)">Dex + Brawl</span></button><button class="ab" onclick="execDef(\'parry\',3,3)" style="flex:1;justify-content:center">&#9876; Parry<br><span style="font-size:8px;color:var(--td)">Dex + Melee</span></button></div>';
h+='<div style="font-size:9px;color:var(--td);font-style:italic">\u2139 In Foundry these buttons appear on the defender\'s chat card. Clicking one auto-rolls their pool and compares.</div>';
h+='</div>';
} else {
h+='<div style="margin-top:8px;padding:8px 10px;background:var(--bl);border:1px solid var(--bd);border-radius:4px;font-size:10px;color:var(--td);line-height:1.5"><span style="color:var(--tb);font-weight:bold">'+rollData.power.n+'</span> resolved. '+(x.succ>0?'Effect applies with '+x.succ+' success'+(x.succ!==1?'es':'')+'.':'Effect fails.')+'</div>';
}
h+='<div style="display:flex;gap:5px;margin-top:8px"><button class="rab" onclick="rollData.step=\'aim\';rollData.mod=0;r()">'+(rollData.isPower?'Cast again':'New attack')+'</button><button class="rab" onclick="closeM()">Close</button></div>';
h+='</div>';

} else if(step==='compared'){
var x=rollData.atkResult,d2=rollData.defResult;
var net=x.succ-d2.succ;
h+='<div style="padding:12px">';
h+='<div style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bl);border-radius:4px;margin-bottom:8px;border-left:2px solid var(--al)"><div style="font-size:14px;flex-shrink:0">\u2694</div><div><div style="font-size:12px;font-weight:bold;color:var(--tb)">Attack: '+x.succ+' success'+(x.succ!==1?'es':'')+'</div><div style="font-size:10px;color:var(--td)">'+w.n+' \u2014 '+F(w.attr)+' + '+F(w.skill)+'</div></div></div>';
h+='<div style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bl);border-radius:4px;margin-bottom:10px;border-left:2px solid #4a7a8a"><div style="font-size:14px;flex-shrink:0">&#9711;</div><div><div style="font-size:12px;font-weight:bold;color:var(--tb)">'+F(d2.type)+': '+d2.succ+' success'+(d2.succ!==1?'es':'')+'</div><div style="font-size:10px;color:var(--td)">Defender\'s response</div></div></div>';

if(net>0){
h+='<div class="RR su" style="flex-direction:column;align-items:flex-start;gap:4px"><span class="ro" style="color:#4a8a4a">\u2714 Hit \u2014 '+net+' net success'+(net!==1?'es':'')+'</span><span class="rs">Attack connects. Defender may now soak.</span></div>';
h+='<div style="margin-top:8px;padding:8px 10px;background:var(--bl);border:1px solid var(--bd);border-radius:4px"><div style="font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--gd);margin-bottom:6px">Soak roll</div><button class="ab" onclick="execSoak('+net+')" style="width:100%;justify-content:center">&#9670; Soak (Stamina)<br><span style="font-size:8px;color:var(--td)">Roll Stamina vs '+net+' net successes</span></button><div style="font-size:9px;color:var(--td);font-style:italic;margin-top:6px">\u2139 In Foundry the soak button auto-appears on hit. Remaining successes = damage dealt.</div></div>';
} else if(net===0){
h+='<div class="RR fa" style="flex-direction:column;align-items:flex-start;gap:4px"><span class="ro">\u2194 Glancing \u2014 tied</span><span class="rs">Attack is deflected. No damage.</span></div>';
} else {
h+='<div class="RR fa" style="flex-direction:column;align-items:flex-start;gap:4px"><span class="ro">\u2716 Miss \u2014 defender wins by '+Math.abs(net)+'</span><span class="rs">Attack is evaded completely.</span></div>';
}

h+='<div style="display:flex;gap:5px;margin-top:10px"><button class="rab" onclick="rollData.step=\'aim\';rollData.mod=0;r()">New attack</button><button class="rab" onclick="closeM()">Close</button></div>';
h+='</div>';

} else if(step==='soaked'){
var x=rollData.atkResult,sk=rollData.soakResult,net=rollData.netHit,soaked=sk.succ,final=Math.max(0,net-soaked);
h+='<div style="padding:12px">';
h+='<div style="font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--gd);margin-bottom:8px">Combat resolution</div>';
h+='<div style="display:flex;gap:6px;margin-bottom:8px"><div style="flex:1;padding:6px 8px;background:var(--bl);border-radius:4px;text-align:center;border-left:2px solid var(--al)"><div style="font-size:9px;color:var(--gd);text-transform:uppercase">Attack</div><div style="font-size:18px;font-weight:bold;color:var(--tb)">'+x.succ+'</div></div><div style="flex:1;padding:6px 8px;background:var(--bl);border-radius:4px;text-align:center;border-left:2px solid #4a7a8a"><div style="font-size:9px;color:var(--gd);text-transform:uppercase">Defense</div><div style="font-size:18px;font-weight:bold;color:var(--tb)">'+rollData.defResult.succ+'</div></div><div style="flex:1;padding:6px 8px;background:var(--bl);border-radius:4px;text-align:center;border-left:2px solid var(--g)"><div style="font-size:9px;color:var(--gd);text-transform:uppercase">Soaked</div><div style="font-size:18px;font-weight:bold;color:var(--tb)">'+soaked+'</div></div></div>';
if(final>0){
h+='<div class="RR su" style="flex-direction:column;align-items:flex-start;gap:4px;background:rgba(139,26,26,.15);border-left-color:var(--al)"><span class="ro" style="color:var(--al)">\u2694 '+final+' damage dealt</span><span class="rs">'+net+' net hit \u2212 '+soaked+' soaked = '+final+' through</span></div>';
} else {
h+='<div class="RR fa" style="flex-direction:column;align-items:flex-start;gap:4px"><span class="ro">Fully soaked</span><span class="rs">'+net+' net hit \u2212 '+soaked+' soaked = no damage</span></div>';
}
h+='<div style="display:flex;gap:5px;margin-top:10px"><button class="rab" onclick="rollData.step=\'aim\';rollData.mod=0;r()">New attack</button><button class="rab" onclick="closeM()">Close</button></div>';
h+='</div>';
}
h+='</div></div>';return h;
}

function execAtk(){
var w=rollData.wpn,mod=rollData.mod||0,hun=rollData.hun!=null?rollData.hun:C.hunger;
var rouseResult=null;
if(rollData.isPower&&rollData.power){var nRouse=parseRouse(rollData.power.cost);if(nRouse>0){rouseResult=rollRouse(nRouse);hun=C.hunger;}}
var av,sv;
if(rollData.poolParsed){av=rollData.poolParsed.av;sv=rollData.poolParsed.sv;}
else{av=getAV(w.attr);sv=getSV(w.skill);}
var pool=Math.max(1,av+sv+mod);
var hc=Math.min(hun,pool),nc=pool-hc,nd=[],hd=[];
for(var i=0;i<nc;i++)nd.push(Math.ceil(Math.random()*10));
for(var i=0;i<hc;i++)hd.push(Math.ceil(Math.random()*10));
var ns=nd.filter(function(x){return x>=6}).length,hs=hd.filter(function(x){return x>=6}).length,tot=ns+hs;
var nt=nd.filter(function(x){return x===10}).length,ht=hd.filter(function(x){return x===10}).length,ho=hd.filter(function(x){return x===1}).length;
var cp=Math.floor((nt+ht)/2),adj=tot+cp*2,cr=cp>0,mc=cr&&ht>0,bf=adj===0&&ho>0;
var oc,cl;if(mc){oc='Messy critical';cl='mc';}else if(cr){oc='Critical';cl='cs';}else if(bf){oc='Bestial failure';cl='bf';}else if(adj===0){oc='Miss';cl='fa';}else{oc='';cl='su';}
rollData.atkResult={nd:nd,hd:hd,succ:adj,pool:pool,oc:oc,cl:cl,mc:mc,bf:bf,rouse:rouseResult};
rollData.step='result';r();
}
function execDef(type,dav,dsv){
var pool=Math.max(1,dav+dsv),nd=[];
for(var i=0;i<pool;i++)nd.push(Math.ceil(Math.random()*10));
var ns=nd.filter(function(x){return x>=6}).length;
var nt=nd.filter(function(x){return x===10}).length;
var cp=Math.floor(nt/2),adj=ns+cp*2;
rollData.defResult={type:type,succ:adj,pool:pool,nd:nd};
rollData.step='compared';r();
}
function execSoak(netHit){
var pool=C.attrs.physical.stamina,nd=[];
for(var i=0;i<pool;i++)nd.push(Math.ceil(Math.random()*10));
var ns=nd.filter(function(x){return x>=6}).length;
var nt=nd.filter(function(x){return x===10}).length;
var cp=Math.floor(nt/2),adj=ns+cp*2;
rollData.soakResult={succ:adj,pool:pool,nd:nd};
rollData.netHit=netHit;
rollData.step='soaked';r();
}
function rQR(){var allA=[],allS=[];for(var c in C.attrs)for(var k in C.attrs[c])allA.push({k:k,v:C.attrs[c][k]});for(var c in C.skills)for(var k in C.skills[c])allS.push({k:k,v:C.skills[c][k]});var sa=rollData.ai||0,si=rollData.si||0,av=allA[sa]?allA[sa].v:0,sv=allS[si]?allS[si].v:0,mod=rollData.mod||0,diff=rollData.diff||1,hun=rollData.hun!=null?rollData.hun:C.hunger,pool=Math.max(1,av+sv+mod),hc=Math.min(hun,pool);var h='<div class="MD op"><div class="M"><div class="MH"><h3>&#9861; Quick roll</h3><button class="MC" onclick="closeM()">&#10005;</button></div><div class="MB"><div class="fg"><label>Attribute</label><select onchange="rollData.ai=this.selectedIndex;r()">';allA.forEach(function(a,i){h+='<option'+(i===sa?' selected':'')+'>'+F(a.k)+' ('+a.v+')</option>';});h+='</select></div><div class="fg"><label>Skill</label><select onchange="rollData.si=this.selectedIndex;r()">';allS.forEach(function(s,i){h+='<option'+(i===si?' selected':'')+'>'+F(s.k)+' ('+s.v+')</option>';});h+='</select></div><div class="fg"><label>Modifier</label><input type="number" value="'+mod+'" onchange="rollData.mod=parseInt(this.value)||0;r()"></div><div class="fg"><label>Difficulty</label><input type="number" value="'+diff+'" min="1" onchange="rollData.diff=parseInt(this.value)||1;r()"><span style="font-size:9px;color:var(--td);margin-left:6px">successes needed</span></div><div class="fg"><label>Hunger</label><input type="number" value="'+hun+'" min="0" max="5" onchange="rollData.hun=parseInt(this.value)||0;r()"></div><div class="PD"><span class="pn2">'+pool+'</span><span class="pl2">dice pool<br><em>'+hc+' hunger '+(hc===1?'die':'dice')+' \u2022 6+ = success</em></span></div></div><div class="MF"><button class="cb2" onclick="closeM()">Cancel</button><button class="rb" onclick="doRl('+av+','+sv+','+diff+',\''+F(allA[sa].k)+' + '+F(allS[si].k)+'\')">Roll</button></div></div></div>';return h;}
function doRl(av,sv,diff,la){var pool=Math.max(1,av+sv),hu=C.hunger,hc=Math.min(hu,pool),nc=pool-hc,nd=[],hd=[];for(var i=0;i<nc;i++)nd.push(Math.ceil(Math.random()*10));for(var i=0;i<hc;i++)hd.push(Math.ceil(Math.random()*10));var ns=nd.filter(function(x){return x>=6}).length,hs=hd.filter(function(x){return x>=6}).length,tot=ns+hs,nt=nd.filter(function(x){return x===10}).length,ht=hd.filter(function(x){return x===10}).length,ho=hd.filter(function(x){return x===1}).length,cp=Math.floor((nt+ht)/2),adj=tot+cp*2,pass=adj>=diff,cr=cp>0,mc=cr&&ht>0,bf=!pass&&ho>0;var oc,cl;if(mc){oc='Messy critical';cl='mc';}else if(cr&&pass){oc='Critical success';cl='cs';}else if(bf){oc='Bestial failure';cl='bf';}else if(tot===0&&!cr){oc='Total failure';cl='fa';}else if(pass){oc='Success';cl='su';}else{oc='Failure';cl='fa';}rollData.result={nd:nd,hd:hd,adj:adj,diff:diff,label:la,oc:oc,cl:cl,mc:mc,bf:bf,pool:pool,hunger:hu};modal='result';r();}
function rRes(){var x=rollData.result;var h='<div class="MD op"><div class="M"><div class="MH"><h3>'+x.label+'</h3><button class="MC" onclick="closeM()">&#10005;</button></div><div style="padding:12px"><div class="rl2"><em>'+x.label+'</em> \u2014 Pool: '+x.pool+', Need: '+x.diff+' successes</div><div class="DT">';x.nd.forEach(function(d){var c='rd0 n';if(d===10)c+=' cr';else if(d>=6)c+=' su';h+='<span class="'+c+'">'+d+'</span>';});x.hd.forEach(function(d){var c='rd0 hd';if(d===10)c+=' cr';else if(d===1)c+=' be';else if(d>=6)c+=' su';h+='<span class="'+c+'">'+d+'</span>';});h+='</div><div class="RR '+x.cl+'"><span class="ro">'+x.oc+'</span><span class="rs">'+x.adj+'/'+x.diff+' successes</span></div>';if(x.mc)h+='<div class="RW m">A Beast lurks behind this victory...</div>';if(x.bf)h+='<div class="RW be">The Beast claws at the surface!</div>';h+='<button class="rab" onclick="doRl('+Math.ceil(x.pool/2)+','+(x.pool-Math.ceil(x.pool/2))+','+x.diff+',\''+x.label.replace(/'/g,"\\'")+'\')">Roll again</button><button class="rab" style="margin-top:3px" onclick="closeM()">Close</button></div></div></div>';return h;}
r();
</script>
